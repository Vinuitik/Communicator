server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # SPA fallback: any path that isn't a real build asset (a client-side
    # route like /friends/add, reached via hard refresh or direct link)
    # resolves to index.html so react-router can take over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
