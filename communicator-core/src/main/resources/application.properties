spring.application.name=communicator-core
server.port=8085

logging.level.root=INFO
logging.level.communicate=DEBUG

# Datasource — injected via docker-compose environment
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Let nginx serve all static assets; Spring only serves API + Thymeleaf templates
spring.web.resources.add-mappings=false

# Multipart (file uploads handled by friend controllers)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# File repository service (Flask)
file.repository.service.url=${FILE_REPOSITORY_SERVICE_URL:http://fileRepository:5000}

# Media pagination page size
app.media.page-size=12

# Scheduling (enables @Scheduled in ChronoJobService)
spring.task.scheduling.pool.size=2
