# Suppress SQL noise and reduce log verbosity during tests
spring.jpa.show-sql=false
logging.level.root=WARN
logging.level.communicate=INFO
logging.level.org.testcontainers=WARN

# TestContainers overrides datasource URL/user/pass via @DynamicPropertySource.
# These placeholders prevent Spring from failing on missing env vars at context load.
SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/test
SPRING_DATASOURCE_USERNAME=test
SPRING_DATASOURCE_PASSWORD=test
FILE_REPOSITORY_SERVICE_URL=http://localhost:5000

# Disable backup scheduler — no pg_dump against test containers
POSTGRES_HOST=localhost
POSTGRES_DB=test
POSTGRES_USER=test
POSTGRES_PASSWORD=test

# Faster Hibernate DDL for tests
spring.jpa.hibernate.ddl-auto=create-drop
