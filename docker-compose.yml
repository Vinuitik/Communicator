version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgresDB
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: example
      POSTGRES_DB: my_database
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redisCache
    ports:
      - "6379:6379"
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  communicator-core:
    build:
      context: .
      dockerfile: communicator-core/Dockerfile
    container_name: communicator-core
    expose:
      - "8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresDB:5432/my_database
      SPRING_DATASOURCE_USERNAME: myapp_user
      SPRING_DATASOURCE_PASSWORD: example
      FILE_REPOSITORY_SERVICE_URL: http://fileRepository:5000
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - maven-cache-core:/root/.m2
    depends_on:
      - postgres
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: nginx
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - ./nginx/static:/usr/share/nginx/html
    ports:
      - "8090:80"
    depends_on:
      - communicator-core
      - mcp-knowledge-server
      - ai-agent
    restart: unless-stopped

  fileRepository:
    build:
      context: .
      dockerfile: resourceRepository/Dockerfile
    image: communicator-filerepository
    container_name: fileRepository
    expose:
      - "5000"
    volumes:
      - file-repo-photos:/app/photos
      - file-repo-videos:/app/videos
      - file-repo-voice:/app/voice
      - file-repo-personal:/app/personalResources
      - file-repo-groups:/app/groups
      - file-repo-connections:/app/connections
      - file-repo-backups:/app/backups
    environment:
      POSTGRES_DB: my_database
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: example
      POSTGRES_HOST: postgresDB
      TZ: ${HOST_TIMEZONE:-UTC}
    depends_on:
      - postgres
    restart: unless-stopped

  mcp-knowledge-server:
    build:
      context: ./knowledgeMCP
      dockerfile: Dockerfile
    container_name: mcp-knowledge-server
    expose:
      - "8000"
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
      PYTHONUNBUFFERED: 1
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: communicator-ollama
    ports:
      - "11434:11434"
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama-data:/root/.ollama
      - ./ollama/startup.sh:/startup.sh
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        /bin/ollama pull koill/sentence-transformers:all-minilm-l6-v2 || true
        wait
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-agent:
    build:
      context: ./ai_agent
      dockerfile: Dockerfile
    container_name: ai-agent
    expose:
      - "8001"
    env_file:
      - ./ai_agent/.env
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
      PYTHONUNBUFFERED: 1
    depends_on:
      - mcp-knowledge-server
      - ollama
    restart: unless-stopped

  generatedData:
    image: mongo:6.0
    container_name: generatedData
    ports:
      - "27020:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_user
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: generated_db
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - generated-data:/data/db
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  file-repo-photos:
    driver: local
  file-repo-videos:
    driver: local
  file-repo-voice:
    driver: local
  file-repo-personal:
    driver: local
  file-repo-groups:
    driver: local
  file-repo-connections:
    driver: local
  file-repo-backups:
    driver: local
  maven-cache-core:
    driver: local
  generated-data:
    driver: local
  ollama-data:
    driver: local
