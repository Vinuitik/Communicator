version: '3.8'

services:
  postgres:
    image: paradedb/paradedb:0.24.3-pg17
    container_name: postgresDB
    command: ["postgres", "-c", "shared_preload_libraries=pg_search"]
    ports:
      - "5433:5432"  # Expose PostgreSQL on local port 5433
    environment:
      POSTGRES_USER: myapp_user
      POSTGRES_PASSWORD: example
      POSTGRES_DB: my_database
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redisCache
    ports:
      - "6379:6379"  # Expose Redis on default port 6379
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes  # Enable persistence
    restart: unless-stopped

  # Single JVM monolith: friend + group + connections + chrono + backup,
  # built from the multi-module Maven reactor (root Dockerfile).
  communicator-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: communicator-app
    expose:
      - "8080"  # Internal only; nginx fronts every /api/* and /backup/ path
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresDB:5432/my_database
      SPRING_DATASOURCE_USERNAME: myapp_user
      SPRING_DATASOURCE_PASSWORD: example
      FILE_REPOSITORY_SERVICE_URL: http://fileRepository:5000
      RESOURCE_REPOSITORY_URL: http://fileRepository:5000
      FILE_REPOSITORY_URL: http://fileRepository:5000
      # Google Drive OAuth (backup) — values from the root .env (see .env.example)
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8090/backup/oauth/callback}
      SYNC_PASSPHRASE: ${SYNC_PASSPHRASE:-}
      BACKUP_KEEP: ${BACKUP_KEEP:-3}
      BACKUP_CRON: ${BACKUP_CRON:-0 0 3 * * *}
      TZ: ${HOST_TIMEZONE:-UTC}
    depends_on:
      - postgres
      - fileRepository
    restart: unless-stopped


  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    ports:
      - "8090:80"  # Expose Nginx on port 80
    depends_on:
      - communicator-app
      - ai-agent
      - react-ui
    restart: unless-stopped

  # Cloudflare Tunnel — publishes communicator.work / my.communicator.work
  # with no open inbound port. Outbound-only connection to Cloudflare's edge;
  # forwards to nginx:80 over the internal docker network per cloudflared/config.yml.
  # Tunnel "app-tunnel" (ffab881e-b703-4875-b191-d67eb91ab679) — same pattern as
  # HabitTracker's sibling setup. credentials.json is gitignored (real secret).
  cloudflared:
    build:
      context: ./cloudflared
      dockerfile: Dockerfile
    container_name: communicator-cloudflared
    depends_on:
      - nginx
    restart: unless-stopped

  fileRepository:
    build:
      context: ./resourceRepository
      dockerfile: Dockerfile
    image: communicator-filerepository  # <-- This forces a lowercase name
    container_name: fileRepository
    expose:
      - "5000"  # Internal exposure only, no external port mapping
    volumes:
      - file-repo-photos:/app/photos
      - file-repo-videos:/app/videos
      - file-repo-voice:/app/voice
      - file-repo-personal:/app/personalResources
      - file-repo-groups:/app/groups
      - file-repo-connections:/app/connections
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    restart: unless-stopped

  # (removed) mcp-knowledge-server — the MCP knowledge tools now run in-process
  # inside ai-agent as a stdio subprocess (ai_agent/knowledgeMCP/knowledgeMCP.py).

  # Standalone ONNX EmbeddingGemma service (ported from ObsidianOptimizer,
  # 2026-07-23). Replaces Ollama for embeddings — wired into ai_agent since
  # the same day (ai_agent/services/embedding_service.py calls this).
  embedder:
    build:
      context: ./embedder
      dockerfile: Dockerfile
    container_name: embedder
    ports:
      - "8010:8010"  # Exposed on host for standalone verification (curl /health, /embed)
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - embedder-models:/models
    restart: unless-stopped

  # Multi-provider LLM gateway (gemini/github/mistral/groq/deepseek/anthropic,
  # priority-ordered failover — see host-wrapper/llm_router.py). Ported from
  # ObsidianOptimizer 2026-07-23, containerized + wired into ai_agent the same
  # day (was host-only at first — dropped the claude-cli provider, which
  # needed host `claude` CLI auth, to make containerizing worth it). Keys come
  # from Postgres (llm_provider_keys, encrypted, set via the settings UI) with
  # this service's own .env as fallback.
  host-wrapper:
    build:
      context: ./host-wrapper
      dockerfile: Dockerfile
    container_name: host-wrapper
    ports:
      - "5011:5011"  # Exposed on host for standalone verification (curl /health, /providers)
    env_file:
      - ./host-wrapper/.env
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
    depends_on:
      - postgres
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"  # Expose Ollama API
    environment:
      TZ: ${HOST_TIMEZONE:-UTC}
      OLLAMA_HOST: 0.0.0.0
    volumes:
      - ollama-data:/root/.ollama  # Persist models and cache
      - ./ollama/startup.sh:/startup.sh  # Startup script to pull model
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start Ollama server in background
        /bin/ollama serve &
        # Wait for Ollama to be ready
        sleep 5
        # Pull the local chat model (mode=ollama in llm_settings routes here).
        # NOT the embedding model anymore — that moved to the standalone
        # embedder service (2026-07-23), this pull would otherwise sit unused.
        /bin/ollama pull llama3.2:3b || true
        # Keep container running
        wait
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ai-agent:
     build:
       context: ./ai_agent
       dockerfile: Dockerfile
     container_name: ai-agent
     expose:
       - "8001"  # Internal exposure only, no external port mapping
     env_file:
       - ./ai_agent/.env  # Load environment variables from .env file
     environment:
       TZ: ${HOST_TIMEZONE:-UTC}
       PYTHONUNBUFFERED: 1
     depends_on:
       - postgres      # knowledge_chunks / chunk_embeddings hybrid search + llm_settings
       - embedder      # ONNX EmbeddingGemma (replaces Ollama for embeddings)
       - host-wrapper  # cloud LLM mode (start-order only — chat still works if this is down and mode=ollama)
     restart: unless-stopped

  react-ui:
     build:
       context: ./react
       dockerfile: Dockerfile
     container_name: react-ui
     expose:
       - "80"  # Internal exposure only, no external port mapping
     environment:
       TZ: ${HOST_TIMEZONE:-UTC}
     volumes:
       - npm-cache:/root/.npm
     restart: unless-stopped

  # generatedData (Mongo) retired 2026-07-23 — friend_summaries, fact_references,
  # knowledge_chunks, chunk_embeddings all moved to Postgres/ParadeDB. The
  # `generated-data` volume is left un-mounted (not deleted) below in case it's
  # ever needed again; the container itself is gone from this file.

  # Durable task queue for async/background work (backups, indexing, decay
  # triggers). Right-sized for a single-user app: real retry + dead-letter
  # semantics + a management UI, without Kafka's operational weight.
  # Replaced Kafka (which was provisioned but unwired).
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP — producers/consumers connect here
      - "15672:15672"  # Management UI at http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-communicator}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-example}
      TZ: ${HOST_TIMEZONE:-UTC}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  file-repo-photos:
    driver: local
  file-repo-videos:
    driver: local
  file-repo-voice:
    driver: local
  file-repo-personal:
    driver: local
  file-repo-groups:
    driver: local
  file-repo-connections:
    driver: local
  npm-cache:
    driver: local
  generated-data:
    driver: local
  rabbitmq-data:
    driver: local
  ollama-data:
    driver: local
  embedder-models:
    driver: local
