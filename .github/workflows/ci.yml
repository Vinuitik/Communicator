name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:

  # ── Job 1: Unit tests — fast gate, no Docker ────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        working-directory: communicator-core
        run: mvn test -B --no-transfer-progress

  # ── Job 2: Integration tests — real Postgres via TestContainers ──────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run integration + system tests
        working-directory: communicator-core
        run: mvn verify -B --no-transfer-progress
        env:
          # TestContainers uses the Docker daemon that ubuntu-latest provides
          TESTCONTAINERS_RYUK_DISABLED: true

  # ── Job 3: Docker build — verify the image compiles ─────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - uses: actions/checkout@v4

      - name: Build communicator-core image
        run: docker build -f communicator-core/Dockerfile -t communicator-core:ci .

  # ── Job 4: ai_agent Python unit tests — fast gate, no Docker ────────────────
  ai-agent-unit-tests:
    name: ai_agent Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ai_agent/requirements.txt
            ai_agent/requirements-test.txt

      - name: Install dependencies
        working-directory: ai_agent
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        working-directory: ai_agent
        run: pytest tests/unit/ -m unit -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}

  # ── Job 5: ai_agent Python integration tests — fakeredis, no Docker ─────────
  ai-agent-integration-tests:
    name: ai_agent Integration Tests
    runs-on: ubuntu-latest
    needs: ai-agent-unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ai_agent/requirements.txt
            ai_agent/requirements-test.txt

      - name: Install dependencies
        working-directory: ai_agent
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run integration tests
        working-directory: ai_agent
        run: pytest tests/integration/ -m integration -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}
