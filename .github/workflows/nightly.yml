name: Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # 2:00 AM UTC every night
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write           # Needed to push the nightly git tag

jobs:

  # ── Full test suite ──────────────────────────────────────────────────────────
  full-test-suite:
    name: Full Test Suite (unit + integration + system)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Full history so we can push tags

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run all tests
        working-directory: communicator-core
        run: mvn verify -B --no-transfer-progress
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

      # ── On success: tag the commit so we have a dated audit trail ───────────
      - name: Tag successful nightly build
        if: success() && github.ref == 'refs/heads/master'
        run: |
          TAG="nightly-$(date -u +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Delete the tag locally if it already exists (re-run same night)
          git tag -d "$TAG" 2>/dev/null || true
          git tag "$TAG"
          git push origin "$TAG" --force

  # ── ai_agent: unit + integration (no Docker) ────────────────────────────────
  ai-agent-fast-tests:
    name: ai_agent Unit + Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ai_agent/requirements.txt
            ai_agent/requirements-test.txt

      - name: Install dependencies
        working-directory: ai_agent
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run unit tests
        working-directory: ai_agent
        run: pytest tests/unit/ -m unit -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}

      - name: Run integration tests
        working-directory: ai_agent
        run: pytest tests/integration/ -m integration -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'test-key' }}

  # ── ai_agent: system tests — requires real infra ────────────────────────────
  ai-agent-system-tests:
    name: ai_agent System Tests
    runs-on: ubuntu-latest
    needs: ai-agent-fast-tests
    # Skip if no Gemini credentials are available
    if: ${{ secrets.GEMINI_API_KEY != '' }}

    services:
      # Matches mongodb_url: mongodb://mongo_user:example@generatedData:27017
      generatedData:
        image: mongo:7
        env:
          MONGO_INITDB_ROOT_USERNAME: mongo_user
          MONGO_INITDB_ROOT_PASSWORD: example
          MONGO_INITDB_DATABASE: generated_db
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Matches redis_url: redis://redisCache:6379
      redisCache:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      # Matches ollama_url: http://ollama:11434
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            ai_agent/requirements.txt
            ai_agent/requirements-test.txt

      - name: Install dependencies
        working-directory: ai_agent
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Pull Ollama embedding model
        run: |
          curl -s http://localhost:11434/api/pull \
            -d '{"name":"koill/sentence-transformers:all-minilm-l6-v2"}' \
            --retry 10 --retry-delay 5 --retry-connrefused

      - name: Build and start MCP knowledge server
        working-directory: knowledgeMCP
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          nohup python knowledgeMCP.py &
          # Wait for it to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:8002/knowledgeMCP/ && break
            sleep 2
          done

      - name: Run system tests
        working-directory: ai_agent
        run: pytest tests/system/ -m system -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Override Docker-compose hostnames → localhost for GitHub Actions runner
          MONGODB_URL:    mongodb://mongo_user:example@localhost:27017
          REDIS_URL:      redis://localhost:6379
          OLLAMA_URL:     http://localhost:11434
          MCP_SERVER_URL: http://localhost:8002/knowledgeMCP/
