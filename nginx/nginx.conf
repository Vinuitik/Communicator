events {
    worker_connections 1024;
}

http {

    include      mime.types;
    default_type application/octet-stream;

    # All five former JVM services are now one monolith on communicator-app:8080.
    # Upstream names kept so the location blocks below are unchanged; each still
    # forwards the exact path its controllers expect.
    upstream friend_service {
        server communicator-app:8080;
    }

    # Add these global settings for file uploads
    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    upstream group_service {
        server communicator-app:8080;
    }

    upstream connection_service {
        server communicator-app:8080;
    }

    upstream media_service {
        server fileRepository:5000;
    }

    upstream chrono_service {
        server communicator-app:8080;
    }

    upstream ai_agent_service {
         server ai-agent:8001;
    }

    upstream react_ui_service {
        server react-ui:80;
    }

    upstream backup_service {
        server communicator-app:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Friend Service
        location /api/friend/ {
            # No trailing slash: preserve the /api/friend prefix so the monolith's
            # PathPrefixConfig-namespaced controllers match.
            proxy_pass http://friend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin http://nginx;

            # Increase timeouts for large file uploads
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
            proxy_request_buffering off;
        }

        


        # Group Service API - handles all other /api/groups/* endpoints
        location /api/groups/ {
            # No trailing slash: preserve the /api/groups prefix (see PathPrefixConfig).
            proxy_pass http://group_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin http://nginx;
            
            # Add CORS headers for API requests
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            
            # Handle preflight requests
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin *;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                return 204;
            }
        }

        

        # Connection Service
        location /api/connections/ {
            # No trailing slash: preserve the /api/connections prefix (see PathPrefixConfig).
            proxy_pass http://connection_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin http://nginx;
        }

        location /api/fileRepository/ {
            proxy_pass http://media_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin http://nginx;
        }

        # Backup Service — no trailing slash on proxy_pass so the /backup prefix is
        # preserved (the controller maps /backup/**, and the Google OAuth redirect URI
        # is http://localhost:8090/backup/oauth/callback).
        location /backup/ {
            proxy_pass http://backup_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # MCP knowledge server is now in-process inside ai_agent (stdio), no HTTP route.

        # Chrono Service (for manual testing only)
        location /api/chrono/ {
            proxy_pass http://chrono_service/chrono/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Origin http://nginx;
        }

        # AI Agent Service
        location /api/ai/ {
             proxy_pass http://ai_agent_service/;
             proxy_set_header Host $host;
             proxy_set_header X-Real-IP $remote_addr;
             proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
             proxy_set_header X-Forwarded-Proto $scheme;
             proxy_set_header Origin http://nginx;
             
             # WebSocket support
             proxy_http_version 1.1;
             proxy_set_header Upgrade $http_upgrade;
             proxy_set_header Connection "upgrade";
             proxy_cache_bypass $http_upgrade;
             
             # Add CORS headers for AI agent
             add_header Access-Control-Allow-Origin *;
             add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
             add_header Access-Control-Allow-Headers "Content-Type, Authorization";
             
             # Handle preflight requests
             if ($request_method = 'OPTIONS') {
                 add_header Access-Control-Allow-Origin *;
                 add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
                 add_header Access-Control-Allow-Headers "Content-Type, Authorization";
                 return 204;
            }
        }

        # React UI Service - Modern SPA routing.
        # Pure proxy_pass — no try_files here. try_files operates on this
        # nginx's own filesystem (root), which /app/ never had, so it always
        # missed and fell through to the catch-all `location /` below,
        # silently serving the legacy static index.html instead of the SPA.
        # Client-side route fallback (e.g. a hard refresh on /app/friends/add)
        # is react-ui's own job now — see react/nginx.conf.
        location /app/ {
            proxy_pass http://react_ui_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Add headers for modern web apps
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # No caching for development
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # React UI health check
        location /app/health {
            proxy_pass http://react_ui_service/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # Redirect for convenience - redirect /validation to React app
        location = /validation {
            return 302 /app/validation;
        }

        # Redirect root path to React app for development
        location = /react {
            return 302 /app/;
        }

        # The legacy vanilla-JS MPA (static/ + Thymeleaf-rendered pages) was
        # removed 2026-07-24 once all 13 of its pages had real React
        # equivalents — see react/PROTO.md. This is an interim cutover, not
        # the final state: React is still mounted at /app/ (basename="/app",
        # CRA `homepage` field), so root just redirects there rather than
        # serving the SPA natively at `/`. A follow-up pass should make React
        # the actual root (drop the /app/ prefix end to end: CRA homepage,
        # router basename, this redirect) instead of leaving this bounce.
        location / {
            return 302 /app/;
        }
    }
}