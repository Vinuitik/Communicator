syntax = "proto3";

package communicator.meetings.v1;

option java_multiple_files = true;
option java_package = "com.communicator.grpc.meetings.v1";
option java_outer_classname = "MeetingGenerationProto";

service MeetingGenerationRpcService {
  rpc GenerateMissingNextMeetingsForAllFriends(GenerateAllFriendsRequest) returns (GenerateMeetingsResponse);
  rpc GenerateMissingNextMeetingsForFriend(GenerateFriendRequest) returns (GenerateMeetingsResponse);
}

message GenerateAllFriendsRequest {}

message GenerateFriendRequest {
  int32 friend_id = 1;
}

message GenerateMeetingsResponse {
  int32 created_count = 1;
}
