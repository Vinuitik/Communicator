# AI Agent Configuration File
# This file contains all configuration settings for the AI Agent microservice

# Application Settings
app:
  name: "AI Agent Service"
  version: "1.0.0"
  host: "0.0.0.0"
  port: 8001
  debug: false
  log_level: "INFO"

# LLM Configuration
llm:
  model: "gemini-2.5-flash"
  temperature: 0.7
  max_tokens: 2048
  timeout: 30
  # Runtime-switchable local/cloud mode — see llm_settings table (mode toggle,
  # default 'ollama') and llm_provider_keys (encrypted cloud provider keys).
  # Ollama chat model pulled at container start (see docker-compose.yml).
  ollama_url: "http://ollama:11434"
  ollama_chat_model: "llama3.2:3b"
  # host-wrapper: multi-provider cloud fanout with failover (gemini/github/
  # mistral/groq/deepseek/anthropic). Used when mode='cloud'.
  host_wrapper_url: "http://host-wrapper:5011"
  host_wrapper_timeout: 120

# Embedding Configuration
embedding:
  # Standalone ONNX EmbeddingGemma service (ai_agent/../embedder), replaces Ollama.
  # 768 dimensions, prompt-asymmetric (embedder handles the doc/query prefix split
  # internally based on the `kind` param EmbeddingService sends).
  provider: "local_onnx"
  model: "onnx-community/embeddinggemma-300m-ONNX"
  embedder_url: "http://embedder:8010"  # Embedder service URL (from docker-compose)
  timeout: 30
  max_retries: 3
  batch_size: 32  # Process up to 32 texts in one batch
  cache_embeddings: true
  embedding_cache_ttl: 86400  # Cache embeddings for 24 hours

# MCP Server Configuration
mcp:
  server_url: "http://mcp-knowledge-server:8000/knowledgeMCP/"
  timeout: 30
  retry_attempts: 3
  connection_retry_delay: 2  # seconds between retries

# Friend Service Configuration
friend_service:
  # Was http://friend:8085 — stale since the 2026-07-12 JVM consolidation
  # (friend/group/connections/chrono/backup merged into one communicator-app
  # container, port 8080). Never updated here, so every FriendApiService call
  # has been silently failing DNS resolution since then (FriendApiService
  # swallows errors -> returns []/None, so nothing crashed, it just always
  # returned empty). Found while testing the new chat tool-calling —
  # get_friends_list came back with a DNS-resolution-failure message baked
  # into its response text.
  #
  # /api/friend prefix required too, not just the hostname: PathPrefixConfig
  # (communicator-app/src/main/java/com/communicator/app/PathPrefixConfig.java)
  # namespaces friend's controllers under /api/friend since the consolidation
  # made bare paths like /updateKnowledge collide across modules in one
  # dispatcher. FriendApiService appends bare paths like /getKnowledge/... to
  # this base_url, so the prefix has to live here.
  base_url: "http://communicator-app:8080/api/friend"
  timeout: 30

# Database Configurations
databases:
  # Redis Configuration (from docker-compose: redis service)
  redis:
    url: "redis://redisCache:6379"
    database: 0
    connection_timeout: 5
    retry_on_timeout: true
    max_connections: 20

  # PostgreSQL/ParadeDB Configuration (from docker-compose: postgres service).
  # Backs knowledge_chunks + chunk_embeddings (hybrid vector+BM25 search) —
  # separate from the JVM app's own datasource, same database/instance.
  postgres:
    dsn: "postgresql://myapp_user:example@postgresDB:5432/my_database"

# Cache Configuration
cache:
  default_ttl: 3600  # 1 hour in seconds
  friend_summary_ttl: 7200  # 2 hours for friend summaries
  tool_cache_ttl: 1800  # 30 minutes for tool results

# Knowledge Service Configuration
knowledge:
  max_knowledge_items_per_request: 30
  summarization_batch_size: 10
  enable_caching: true

# Logging Configuration
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file:
    enabled: true
    path: "logs/ai_agent.log"
    max_size: "10MB"
    backup_count: 5
  console:
    enabled: true

# Security Configuration
security:
  cors:
    allow_origins: ["*"]
    allow_credentials: true
    allow_methods: ["*"]
    allow_headers: ["*"]

# Development/Production Overrides
development:
  debug: true
  log_level: "DEBUG"
  
production:
  debug: false
  log_level: "WARNING"
  cors:
    allow_origins: ["http://localhost:8090"]  # Only allow nginx

citation:
  chunk:
    size: 500
    overlap: 50

# Chunking Configuration (for new ChunkingService)
chunking:
  chunk_size_words: 100  # Words per chunk
  chunk_overlap_words: 20  # Overlap between chunks for context preservation
  min_chunk_size_words: 60  # Don't chunk if text is smaller than this
  chunking_mode: "eager"  # "eager" = process on create/update, "lazy" = process on first use

# Search Configuration (hybrid pgvector + pg_search BM25, fused via RRF)
search:
  top_k_chunks: 5  # Number of top fused results to return per query
  candidates_per_side: 20  # Top-N pulled from each of vector/BM25 before fusion
  rrf_k: 60  # RRF constant: score = sum(1 / (rrf_k + rank)) across both rankings
  # NOTE: with RRF fusion this is on a ~0-0.033 scale, not cosine similarity
  # (two rankings, each contributing at most 1/(rrf_k+1) ≈ 0.0164). Was a
  # no-op at 0.0 under the old FAISS/cosine scoring too; stays a no-op here.
  min_relevance_threshold: 0.0

# Referencing/Validation Configuration (for new ReferencingService)
referencing:
  max_references_per_fact: 3  # Maximum number of chunk references to keep per fact
  min_validation_confidence: 0.8  # Minimum confidence score for AI validation
  discard_if_no_references: true  # Discard facts with no valid references
